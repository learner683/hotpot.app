# ==================== 模块一：多源采集 ====================
def get_weibo_hotsearch():
    url = "https://weibo.com/ajax/side/hotSearch"
    headers = {
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        "Referer": "https://weibo.com/",
    }
    try:
        resp = requests.get(url, headers=headers, timeout=10)
        resp.raise_for_status()
        data = resp.json()
        hot_list = data.get("data", {}).get("realtime", [])
        if not hot_list:
            print("⚠️ 微博无数据")
            return []
        print(f"✅ 微博: {len(hot_list)} 条")
        cleaned = []
        for item in hot_list:
            raw = item.get("word", "")
            clean = raw.replace("热","").replace("沸","").replace("爆","").replace("新","").strip()
            cleaned.append({
                "source": "weibo",
                "title": clean,
                "url": f"https://s.weibo.com/weibo?q={raw}",
                "raw_rank": item.get("rank", 0),
                "raw_hot": item.get("num", 0),
                "fetch_time": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
            })
        return cleaned
    except Exception as e:
        print(f"❌ 微博失败: {e}")
        return []

def get_baidu_hotsearch():
    """百度实时热搜 — 官方 JSON 接口"""
    url = "https://top.baidu.com/api/board?tab=realtime&platform=wise"
    headers = {
        "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
        "Referer": "https://top.baidu.com/",
    }
    try:
        resp = requests.get(url, headers=headers, timeout=10)
        resp.raise_for_status()
        data = resp.json()
        cards = data.get("data", {}).get("cards", [])
        hot_list = []
        for card in cards:
            if card.get("card_type") == "realtime":
                hot_list = card.get("content", [])
                break
        if not hot_list:
            print("⚠️ 百度无数据")
            return []
        print(f"✅ 百度: {len(hot_list)} 条")
        cleaned = []
        for idx, item in enumerate(hot_list, 1):
            title = item.get("word", "").strip()
            cleaned.append({
                "source": "baidu",
                "title": title,
                "url": item.get("url", ""),
                "raw_rank": idx,
                "raw_hot": item.get("hotScore", 0),
                "fetch_time": datetime.now().strftime("%Y-%m-%d %H:%M:%S")
            })
        return cleaned
    except Exception as e:
        print(f"❌ 百度失败: {e}")
        return []

